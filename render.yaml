services:
  - type: web
    name: multimodal-qa-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AIPIPE_TOKEN
        sync: false
      - key: MODEL
        value: gpt-4o-mini
